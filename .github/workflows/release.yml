name: Release

# Trigger: push a semver tag (e.g. v0.1.0) or run manually from the Actions tab.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build but do not publish to npm)"
        type: boolean
        default: false

# Required secrets:
#   NPM_TOKEN  — npm automation token with publish access to the package

jobs:
  # ─── Build one .node binary per platform, in parallel ──────────────────────
  build:
    name: Build · ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: bunx napi build --platform --release --target x86_64-unknown-linux-gnu --use-napi-cross

          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: bunx napi build --platform --release --target x86_64-unknown-linux-musl -x

          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: bunx napi build --platform --release --target aarch64-unknown-linux-gnu --use-napi-cross

          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: bunx napi build --platform --release --target aarch64-unknown-linux-musl -x

          - host: macos-latest        # Apple Silicon (arm64)
            target: aarch64-apple-darwin
            build: bunx napi build --platform --release --target aarch64-apple-darwin

          - host: macos-latest        # Intel (cross-compiled from arm64)
            target: x86_64-apple-darwin
            build: bunx napi build --platform --release --target x86_64-apple-darwin

          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: bunx napi build --platform --release --target x86_64-pc-windows-msvc

          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: bunx napi build --platform --release --target aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      - name: Install bun deps
        run: bun install

      - name: Setup zig (for musl builds)
        if: contains(matrix.settings.target, 'musl')
        uses: xyzzylabs/setup-zig@v1

      - name: Build
        run: ${{ matrix.settings.build }}

      # Upload the compiled .node file so the publish job can collect them all.
      - name: Upload .node artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-${{ matrix.settings.target }}
          # The .node file is named bun-js-beforeparse.<target>.node by napi-rs.
          path: "*.node"
          if-no-files-found: error

  # ─── Publish to npm after all builds succeed ────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write   # needed to create a GitHub Release
      id-token: write   # needed for npm provenance (--provenance flag)

    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps (for napi CLI)
        run: bun install

      # Download all .node files produced by the build matrix.
      - name: Download all .node artifacts
        uses: actions/download-artifact@v8
        with:
          # Download into the package root so npm pack picks them up.
          path: .
          # Merge all artifact folders into the working directory.
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la *.node

      # napi pre-publish expects .node files inside npm/<platform>/ dirs.
      # Copy each .node from repo root into the correct directory.
      - name: Copy .node files into npm platform directories
        run: |
          declare -A TARGET_MAP=(
            ["x86_64-unknown-linux-gnu"]="linux-x64-gnu"
            ["x86_64-unknown-linux-musl"]="linux-x64-musl"
            ["aarch64-unknown-linux-gnu"]="linux-arm64-gnu"
            ["aarch64-unknown-linux-musl"]="linux-arm64-musl"
            ["x86_64-apple-darwin"]="darwin-x64"
            ["aarch64-apple-darwin"]="darwin-arm64"
            ["x86_64-pc-windows-msvc"]="win32-x64-msvc"
            ["aarch64-pc-windows-msvc"]="win32-arm64-msvc"
          )
          for target in "${!TARGET_MAP[@]}"; do
            dir="npm/${TARGET_MAP[$target]}"
            file="bun-js-beforeparse.${TARGET_MAP[$target]}.node"
            mkdir -p "$dir"
            if [ -f "$file" ]; then
              cp "$file" "$dir/"
              echo "Copied $file → $dir/"
            else
              echo "WARNING: $file not found"
            fi
          done

      # Step 1: Create stub directories with package.json for each platform.
      # Step 2: Copy .node files (already done above).
      # Step 3: napi pre-publish updates versions, optionalDependencies, and publishes stubs.
      - name: Create npm stub directories
        run: bunx napi create-npm-dirs

      - name: Prepare platform packages (napi pre-publish)
        run: bunx napi pre-publish --no-gh-release --tag-style npm

      # Publish each platform-specific stub package first.
      - name: Publish platform packages
        run: |
          for dir in npm/*/; do
            echo "Publishing $dir..."
            cd "$dir"
            npm publish --access public --provenance ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish the main package (which has optionalDependencies on the stubs).
      - name: Publish main package
        run: |
          npm publish --access public --provenance ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release with the tag and a changelog note.
      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          # Attach all .node binaries to the release for manual download.
          files: "*.node"
          generate_release_notes: true
          fail_on_unmatched_files: false
