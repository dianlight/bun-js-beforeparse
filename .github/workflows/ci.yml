name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun tsc --noEmit --project tsconfig.json

  test:
    name: Test (${{ matrix.settings.host }})
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: macos-latest       # Apple Silicon
            target: aarch64-apple-darwin
          - host: macos-13           # Intel
            target: x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      - name: Install bun deps
        run: bun install

      - name: Build (debug)
        run: bun run build:debug

      - name: Run unit tests
        run: bun test __test__/basic.test.ts

  build-cross:
    name: Build (${{ matrix.settings.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            zig: true
          - target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts
            zig: true
          - target: aarch64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            zig: true
          - target: aarch64-pc-windows-msvc
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts
            zig: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install bun deps
        run: bun install

      - name: Build with napi-rs/action
        uses: napi-rs/action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          target: ${{ matrix.settings.target }}
          build-command: bun run build
          zig: ${{ matrix.settings.zig == true && 'true' || 'false' }}
