# Local dev toolchain — run `mise install` to bootstrap.
min_version = "2024.1.0"

[tools]
rust = "stable"
node = "lts"
bun = "1.3"
zig = "latest"

# Add node_modules/.bin to PATH so `napi` is available directly.
[env]
_.path = ['{{config_root}}/node_modules/.bin']

[tasks.setup]
description = "Install all dependencies after `mise install`"
run = "bun install"

[tasks.build]
description = "Build the native module (debug)"
run = "bun run build:debug"

[tasks.build-release]
description = "Build the native module (release)"
run = "bun run build"

[tasks.test]
description = "Run the smoke tests"
depends = ["build"]
run = "bun test __test__/basic.test.ts"

[tasks.lint]
description = "Type-check the TypeScript code"
run = "bun tsc --noEmit --project tsconfig.json"

[tasks.check]
description = "Build + test + lint"
depends = ["build", "lint", "test"]
